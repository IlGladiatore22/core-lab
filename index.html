<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Lab</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #06050b;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .loader {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            animation: fadeUp .8s ease both;
        }
        .loader img {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            animation: pulse 2s infinite;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="loader">
        <img src="https://media.discordapp.net/attachments/1356283766942863453/1518320595459379412/Core_Lab_1.png?ex=6a3b77fe&is=6a3a267e&hm=0d28c1f34d07f11e4fe8f3d3ab49758d75a74661e4ae5cad7850354e46181&=&format=webp&quality=lossless&width=450&height=450" alt="Logo">
    </div>

    <script>
        (async function() {
            var p = new URLSearchParams(window.location.search);
            var uid = p.get('uid');
            
            // 1. Se arrivo da Render con l'uid (ho appena fatto il login)
            if (uid) {
                try {
                    var res = await fetch('https://api.jsonbin.io/v3/b/6a3ad2d7da38895dfef34b4c/latest', {
                        headers: { 'X-Master-Key': '$2a$10$qkZpapSrdLMpR4AnUmla1.9sAQsP1yExqViMJHxkzGZdj7ETMeO6S' }
                    });
                    var data = await res.json();
                    var user = data.record.users.find(function(u) { return u.id === uid; });
                    if (user) {
                        localStorage.setItem('corelab_user', JSON.stringify(user));
                    }
                    // Pulisce l'URL dal ?uid=...
                    window.history.replaceState({}, document.title, window.location.pathname);
                    // Vado alla home
                    window.location.href = 'html/home.html';
                    return;
                } catch(e) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }

            // 2. Controllo se l'utente è già loggato
            try {
                var u = JSON.parse(localStorage.getItem('corelab_user'));
                if (u && u.id) {
                    window.location.href = 'html/home.html';
                    return;
                }
            } catch(e) {}

            // 3. Se non è loggato, mando al login
            window.location.href = 'html/login.html';
        })();
    </script>
</body>
</html>
