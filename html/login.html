<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Lab — Login</title>
    <link rel="stylesheet" href="../estetica/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="bg-scene">
        <div class="bg-orb o1"></div>
        <div class="bg-orb o2"></div>
        <div class="bg-orb o3"></div>
        <div class="bg-grain"></div>
    </div>

    <div class="login-wrap">
        <div class="login-card">
            <div class="logo-ring">
                <div class="ring-spin"></div>
                <img class="logo" src="https://media.discordapp.net/attachments/1356283766942863453/1518320595459379412/Core_Lab_1.png?ex=6a3b77fe&is=6a3a267e&hm=0d28c1f34d07f11e4fe8f3d3ab49758d75a74661e4ae5cad7850354e46181&=&format=webp&quality=lossless&width=450&height=450" alt="Logo">
            </div>

            <h1>Core Lab</h1>
            <p class="sub">Accedi al tuo account</p>

            <div class="error-msg" id="errorMsg" style="display:none;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Errore durante il login. Riprova.</span>
            </div>

            <div class="discord-btn" id="loadingBtn" style="display:none; pointer-events:none; opacity:0.7;">
                <i class="fa-solid fa-spinner fa-spin"></i>
                Accesso in corso...
            </div>

            <a href="#" class="discord-btn" id="discordLogin">
                <i class="fa-brands fa-discord"></i>
                Accedi con Discord
            </a>

            <p class="terms">Accedendo accetti i termini di servizio</p>
        </div>
    </div>

    <script>
        var errorMsg = document.getElementById('errorMsg');
        var errorText = document.getElementById('errorText');
        var loginBtn = document.getElementById('discordLogin');
        var loadingBtn = document.getElementById('loadingBtn');

        function showError(msg) {
            loginBtn.style.display = 'flex';
            loadingBtn.style.display = 'none';
            errorText.textContent = msg;
            errorMsg.style.display = 'flex';
        }

        // 1. Se già loggato, vai alla home
        try {
            var u = JSON.parse(localStorage.getItem('corelab_user'));
            if (u && u.id) {
                window.location.replace('../index.html');
                throw new Error('exit');
            }
        } catch(e) { if(e.message === 'exit') throw e; }

        // 2. Funzioni crittografiche per la sicurezza (Obbligatorie per GitHub Pages)
        function generateRandomString(length) {
            var text = '';
            var possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (var i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
            return text;
        }

        async function sha256(plain) {
            var encoder = new TextEncoder();
            var data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        function base64urlencode(str) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        async function generateCodeChallenge(verifier) {
            var hashed = await sha256(verifier);
            return base64urlencode(hashed);
        }

        // 3. Logica
        (async function() {
            // Controlla se Discord ci ha rimandato indietro con un "code"
            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');

            if (code) {
                loginBtn.style.display = 'none';
                loadingBtn.style.display = 'flex';

                var verifier = localStorage.getItem('discord_pkce_verifier');
                if (!verifier) {
                    showError('Errore di sicurezza. Ricarica la pagina e riprova.');
                    return;
                }

                try {
                    // Scambia il "code" con il vero "access_token" direttamente dal browser
                    var tokenRes = await fetch('https://discord.com/api/oauth2/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: '1518326560321573156',
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: window.location.origin + window.location.pathname,
                            code_verifier: verifier
                        })
                    });

                    var tokenData = await tokenRes.json();
                    var accessToken = tokenData.access_token;

                    if (!accessToken) throw new Error('No token');

                    // Chiediamo a Discord chi è l'utente
                    var userRes = await fetch('https://discord.com/api/users/@me', {
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    });
                    var user = await userRes.json();

                    if (user.id) {
                        var avatarUrl = user.avatar 
                            ? 'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.png' 
                            : 'https://cdn.discordapp.com/embed/avatars/0.png';

                        var userData = {
                            id: user.id,
                            username: user.username,
                            globalName: user.global_name || user.username,
                            avatar: avatarUrl,
                            firstLogin: Date.now(),
                            lastLogin: Date.now(),
                            purchases: 0
                        };

                        localStorage.setItem('corelab_user', JSON.stringify(userData));
                        window.location.href = '../index.html';
                    } else {
                        throw new Error('No user ID');
                    }
                } catch(err) {
                    showError('Errore di connessione con Discord.');
                }
            } 
            // Se non c'è nessun "code", prepara il link per il login
            else {
                var verifier = generateRandomString(128);
                localStorage.setItem('discord_pkce_verifier', verifier);
                var challenge = await generateCodeChallenge(verifier);

                var discordParams = new URLSearchParams({
                    client_id: '1518326560321573156',
                    redirect_uri: window.location.origin + window.location.pathname,
                    response_type: 'code',
                    scope: 'identify',
                    code_challenge: challenge,
                    code_challenge_method: 'S256'
                });

                loginBtn.href = 'https://discord.com/api/oauth2/authorize?' + discordParams.toString();
            }
        })();
    </script>
</body>
</html>
