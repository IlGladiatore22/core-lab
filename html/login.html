<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Lab — Login</title>
    <link rel="stylesheet" href="../estetica/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="bg-scene">
        <div class="bg-orb o1"></div>
        <div class="bg-orb o2"></div>
        <div class="bg-orb o3"></div>
        <div class="bg-grain"></div>
    </div>

    <div class="login-wrap">
        <div class="login-card">
            <!-- logo cerchiato -->
            <div class="logo-ring">
                <div class="ring-spin"></div>
                <img class="logo" src="https://media.discordapp.net/attachments/1356283766942863453/1518320595459379412/Core_Lab_1.png?ex=6a3b77fe&is=6a3a267e&hm=0d28c1f34d07f11e4fe8f3d3ab49758d75a74661e4ae5cad7857850354e46181&=&format=webp&quality=lossless&width=450&height=450" alt="Logo">
            </div>

            <h1>Core Lab</h1>
            <p class="sub">Accedi al tuo account</p>

            <!-- errore -->
            <div class="error-msg" id="errorMsg" style="display:none;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Errore durante il login. Riprova.</span>
            </div>

            <!-- bottone discord -->
            <a href="#" class="discord-btn" id="discordLogin">
                <i class="fa-brands fa-discord"></i>
                Accedi con Discord
            </a>

            <p class="terms">Accedendo accetti i termini di servizio</p>
        </div>
    </div>

    <script>
        // legge l'errore dall'URL
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').style.display = 'flex';
        }

        // costruisce l'URL di autorizzazione Discord
        var params = new URLSearchParams({
            client_id: '1518326560321573156',
            redirect_uri: 'https://iltuobackend.onrender.com/callback'
            response_type: 'code',
            scope: 'identify'
        });

        document.getElementById('discordLogin').href =
            'https://discord.com/api/oauth2/authorize?' + params.toString();
    </script>
</body>
</html>
